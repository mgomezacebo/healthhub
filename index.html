<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HealthHub - Control de Salud y Calorías</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #020617; /* bg-slate-950 */
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom scrollbar for a premium look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a; /* bg-slate-900 */
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; /* bg-slate-700 */
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569; /* bg-slate-600 */
        }
    </style>
</head>
<body class="h-full text-slate-100 antialiased overflow-x-hidden">
    
    <!-- Main Center Wrapper to emulate mobile frame on desktop, but fill mobile screens -->
    <div class="mx-auto min-h-screen w-full max-w-md bg-slate-900 shadow-2xl flex flex-col relative border-x border-slate-800/50">
        <!-- SPA Target Container -->
        <div id="app-root" class="flex-1 flex flex-col pb-24">
            <!-- Content will be rendered here by script.js -->
            <div class="flex-1 flex items-center justify-center p-6">
                <div class="text-center space-y-4">
                    <div class="w-16 h-16 bg-emerald-500/10 border border-emerald-500/30 rounded-2xl flex items-center justify-center mx-auto animate-pulse">
                        <svg class="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
                        </svg>
                    </div>
                    <h1 class="text-2xl font-bold tracking-tight text-white">Cargando HealthHub...</h1>
                    <p class="text-sm text-slate-400">Iniciando base de datos local</p>
                </div>
            </div>
        </div>
        
        <!-- Toast container -->
        <div id="toast-container" class="fixed bottom-24 left-1/2 -translate-x-1/2 z-50 w-full max-w-xs px-4 pointer-events-none transition-all duration-300 transform translate-y-4 opacity-0">
            <div id="toast-element" class="bg-slate-800 border border-slate-700 text-slate-100 rounded-xl px-4 py-3 shadow-lg flex items-center gap-3">
                <!-- Icon will be inserted dynamically -->
                <div id="toast-icon"></div>
                <p id="toast-message" class="text-sm font-medium"></p>
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script src="script.js"></script>
</body>
</html>
